<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Auth Screen -->
    <div id="auth-container" class="container auth-wrapper">
        <div class="card auth-card">
            <h2 id="auth-title">Login</h2>
            <form id="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" required />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required />
                </div>
                <button class="btn" type="submit" id="auth-submit-btn">Login</button>
            </form>
            <p class="auth-switch">
                <span id="auth-switch-text">Don't have an account?</span>
                <a href="#" id="auth-switch-link">Sign Up</a>
            </p>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div class="container hidden" id="app-container">
        <div class="app-header">
            <h2>Expense Tracker</h2>
            <button class="btn-logout" id="logout-btn">Logout (<span id="current-user-name"></span>)</button>
        </div>

        <div class="balance-board card">
            <h4>Your Balance</h4>
            <h1 id="balance">₹0.00</h1>
            
            <div class="inc-exp-container">
                <div>
                    <h4>All-Time Income</h4>
                    <p id="money-plus" class="money plus">+₹0.00</p>
                </div>
                <div>
                    <h4>All-Time Expense</h4>
                    <p id="money-minus" class="money minus">-₹0.00</p>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="add-transaction card">
                <h3>Add New Transaction</h3>
                <form id="form">
                    <div class="form-group type-toggles">
                        <input type="radio" name="type" value="income" checked id="type-income">
                        <label for="type-income" class="toggle-btn income-toggle">+ Income</label>
                        
                        <input type="radio" name="type" value="expense" id="type-expense">
                        <label for="type-expense" class="toggle-btn expense-toggle">- Expense</label>
                    </div>

                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" required />
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <input list="category-options" id="category" placeholder="Select or enter custom..." autocomplete="off" required />
                        <datalist id="category-options"></datalist>
                    </div>

                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" placeholder="Enter amount..." step="0.01" min="0.01" required />
                    </div>

                    <div class="form-group">
                        <label for="text">Description (Optional)</label>
                        <input type="text" id="text" placeholder="Enter description..." autocomplete="off" />
                    </div>

                    <button class="btn" type="submit">Add Transaction</button>
                </form>
            </div>

            <div class="side-content">
                <div class="history card">
                    <h3>History</h3>
                    <ul id="list" class="list">
                        <!-- Transactions -->
                    </ul>
                </div>

                <div class="periodic-summary card">
                    <div class="summary-header">
                        <h3>Periodic Summary</h3>
                        <select id="filter" class="period-select">
                            <option value="weekly">This Week</option>
                            <option value="monthly" selected>This Month</option>
                            <option value="yearly">This Year</option>
                        </select>
                    </div>
                    
                    <div class="inc-exp-container summary-cards">
                        <div>
                            <h4>Income</h4>
                            <p id="period-money-plus" class="money plus">+₹0.00</p>
                        </div>
                        <div>
                            <h4>Expense</h4>
                            <p id="period-money-minus" class="money minus">-₹0.00</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
