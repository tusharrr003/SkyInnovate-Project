<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Expense Tracker</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="dashboard-header">
            <h1>Expense Tracker</h1>
            <div class="balance-container">
                <h4>Total Balance</h4>
                <h2 id="balance">₹0.00</h2>
            </div>
            <div class="summary-cards">
                <div class="card income-card">
                    <h4>Income</h4>
                    <p id="money-plus" class="money plus">+₹0.00</p>
                </div>
                <div class="card expense-card">
                    <h4>Expense</h4>
                    <p id="money-minus" class="money minus">-₹0.00</p>
                </div>
            </div>
        </header>

        <main class="dashboard-content">
            <section class="add-transaction-section glass-panel">
                <h3>Add New Transaction</h3>
                <form id="form">
                    <div class="form-control type-toggle">
                        <input type="radio" id="type-income" name="type" value="income" checked />
                        <label for="type-income" class="toggle-btn income-btn">Income (+)</label>
                        <input type="radio" id="type-expense" name="type" value="expense" />
                        <label for="type-expense" class="toggle-btn expense-btn">Expense (-)</label>
                    </div>
                    <div class="form-control">
                        <label for="category">Category</label>
                        <select id="category">
                            <!-- Options updated by JS -->
                        </select>
                    </div>
                    <div class="form-control">
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" placeholder="Enter amount..." step="0.01" min="0.01" />
                    </div>
                    <div class="form-control">
                        <label for="text">Description (Optional)</label>
                        <input type="text" id="text" placeholder="e.g. details..." autocomplete="off" />
                    </div>
                    <button class="btn primary-btn" type="submit">Add Transaction</button>
                </form>
            </section>

            <section class="history-section glass-panel">
                <h3>Transaction History</h3>
                <ul id="list" class="list">
                    <!-- Transactions will be inserted here dynamically -->
                </ul>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
